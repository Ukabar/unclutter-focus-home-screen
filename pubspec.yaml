name: stillscreen_focus_launcher
description: "A minimalist iOS-first companion for a text-based Home Screen widget."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand/stillscreen_logo.png
    - assets/catalog/curated_apps.json
